<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#005f8a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:0.25"/>
    </linearGradient>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rocketNose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0090CC;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rocketGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="20" y1="40" x2="180" y2="40"/>
    <line x1="20" y1="80" x2="180" y2="80"/>
    <line x1="20" y1="120" x2="180" y2="120"/>
    <line x1="20" y1="160" x2="180" y2="160"/>
    <line x1="50" y1="30" x2="50" y2="170"/>
    <line x1="90" y1="30" x2="90" y2="170"/>
    <line x1="130" y1="30" x2="130" y2="170"/>
  </g>

  <!-- Area fill under the chart line -->
  <path d="M 20,155 L 40,150 L 55,145 L 70,140 L 80,135 L 90,130 L 95,138 L 100,125 L 110,118 L 120,105 L 128,95 L 135,78 L 135,170 L 20,170 Z"
        fill="url(#glowGrad)"/>

  <!-- Stock chart line - going up with some dips -->
  <polyline
    points="20,155 40,150 55,145 70,140 80,135 90,130 95,138 100,125 110,118 120,105 128,95 135,78"
    fill="none"
    stroke="#00BFFF"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Small dot at chart end -->
  <circle cx="135" cy="78" r="3" fill="#00BFFF" filter="url(#glow)"/>

  <!-- Rocket ship (angled to follow chart trajectory) -->
  <g transform="translate(148, 48) rotate(35)" filter="url(#rocketGlow)">
    <!-- Rocket body -->
    <rect x="-8" y="-22" width="16" height="36" rx="5" ry="5" fill="url(#rocketBody)"/>

    <!-- Nose cone -->
    <path d="M -8,-22 Q -8,-36 0,-42 Q 8,-36 8,-22 Z" fill="url(#rocketNose)"/>

    <!-- Window -->
    <circle cx="0" cy="-12" r="4" fill="#0a0a0a" stroke="#00BFFF" stroke-width="1.2"/>
    <circle cx="0" cy="-12" r="2" fill="#00BFFF" opacity="0.3"/>

    <!-- Side fins -->
    <path d="M -8,8 L -16,18 L -8,14 Z" fill="#00BFFF"/>
    <path d="M 8,8 L 16,18 L 8,14 Z" fill="#00BFFF"/>

    <!-- Bottom fin -->
    <path d="M -3,14 L 0,20 L 3,14 Z" fill="#0090CC"/>

    <!-- Flame -->
    <ellipse cx="0" cy="22" rx="5" ry="8" fill="#FFD60A" opacity="0.9"/>
    <ellipse cx="0" cy="24" rx="3" ry="6" fill="#FF5000" opacity="0.9"/>
    <ellipse cx="0" cy="25" rx="1.5" ry="4" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- Small sparkle/stars around rocket -->
  <circle cx="170" cy="30" r="1.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="125" cy="42" r="1" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="175" cy="55" r="1" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="160" cy="70" r="1.2" fill="#FFFFFF" opacity="0.6"/>
</svg>
