name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS
        run: npm run build:mac

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
